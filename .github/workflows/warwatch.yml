name: WarWatch Bot

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
          GMAIL_ADDRESS:   ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS:  ${{ secrets.GMAIL_APP_PASS }}
          REPORT_TO_EMAIL: ${{ secrets.REPORT_TO_EMAIL }}
        run: python bot.py --actions

      - name: Commit and push updates
        run: |
          git config user.name  "WarWatch Bot"
          git config user.email "bot@warwatch"
          git add seen_urls.json live_data.js dashboard.html reports/ || true
          git diff --staged --quiet || git commit -m "bot: update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

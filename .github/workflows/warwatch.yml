name: WarWatch Bot

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:           # manual trigger from GitHub Actions UI

permissions:
  contents: write              # needed to commit live_data.js back to repo

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          GMAIL_ADDRESS:     ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS:    ${{ secrets.GMAIL_APP_PASS }}
          REPORT_TO_EMAIL:   ${{ secrets.REPORT_TO_EMAIL }}
        run: python bot.py --actions

      - name: Commit updated files back to repo
        run: |
          git config user.name  "WarWatch Bot"
          git config user.email "bot@warwatch.local"
          git add live_data.js seen_urls.json reports/ dashboard_log.html || true
          git diff --cached --quiet || git commit -m "bot: update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

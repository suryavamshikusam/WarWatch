name: WarWatch Bot

on:
  schedule:
    # Runs every 15 minutes (minimum GitHub allows)
    - cron: '*/15 * * * *'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the full repo (including reports/ and seen_urls.json)
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so git push works cleanly

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Run the bot (single-shot mode for Actions)
      - name: Run bot
        env:
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          GMAIL_ADDRESS:    ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS:   ${{ secrets.GMAIL_APP_PASS }}
          REPORT_TO_EMAIL:  ${{ secrets.REPORT_TO_EMAIL }}
        run: python bot.py --actions

      # 5. Commit updated files back to repo
      #    (seen_urls.json, reports/*.json, live_data.js, dashboard.html)
      - name: Commit and push updates
        run: |
          git config user.name  "WarWatch Bot"
          git config user.email "bot@warwatch"
          git add seen_urls.json live_data.js dashboard.html reports/ || true
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "bot: update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

name: WarWatch Bot

on:
  schedule:
    # Runs every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Force full pipeline run (ignores freshness check)"
        required: false
        default: "false"
      prices_only:
        description: "Prices update only (skip AI)"
        required: false
        default: "false"

# Only allow one run at a time — cancel in-progress if a newer one starts
concurrency:
  group: warwatch-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write   # needed to commit live_data.js / seen_urls.json back

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Run bot ───────────────────────────────────────────────────────────
      - name: Run WarWatch bot (prices only)
        if: github.event.inputs.prices_only == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS:  ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          REPORT_TO_EMAIL: ${{ secrets.REPORT_TO_EMAIL }}
        run: python bot.py --prices

      - name: Run WarWatch bot (force full run)
        if: github.event.inputs.force_run == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS:  ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          REPORT_TO_EMAIL: ${{ secrets.REPORT_TO_EMAIL }}
        run: python bot.py

      - name: Run WarWatch bot (scheduled / actions mode)
        if: github.event_name == 'schedule' || (github.event.inputs.force_run != 'true' && github.event.inputs.prices_only != 'true')
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS:  ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          REPORT_TO_EMAIL: ${{ secrets.REPORT_TO_EMAIL }}
        run: python bot.py --actions

      # ── 4. Commit updated data files back to repo ────────────────────────────
      - name: Commit updated data files
        run: |
          git config user.name  "WarWatch Bot"
          git config user.email "warwatch-bot@users.noreply.github.com"

          # Stage only the files the bot writes — never stage source code
          git add -f live_data.js prices_data.js seen_urls.json prices_history.json || true
          git add -f reports/*.json 2>/dev/null || true

          # Only commit if there's actually something to commit
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "bot: update live data [${TIMESTAMP}]"
            git push
          fi

name: WarWatch Bot
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: warwatch-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 25    # ← was 10, increased to handle Gemini retries
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python bot.py --actions

      - name: Commit updated data files
        run: |
          git config user.name  "WarWatch Bot"
          git config user.email "bot@warwatch"
          git add live_data.js prices_data.js seen_urls.json reports/ cache/ || true
          git diff --staged --quiet || git commit -m "bot: update [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push || echo "Push failed — will retry next run"

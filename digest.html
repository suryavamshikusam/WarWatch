<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WarWatch — Daily Digest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'IBM Plex Sans',sans-serif;font-size:15px;line-height:1.75;background:#141414;color:#ddd;height:100vh;display:flex;flex-direction:column}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes aiDot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── HEADER ── */
header{background:#1a1a1a;padding:23px 32px;position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2a2a2a;flex-shrink:0}
.masthead{font-size:22px;font-weight:900;letter-spacing:-.02em;display:flex;align-items:center;line-height:1}
.masthead-war{background:#c41e3a;color:#fff;padding:3px 10px}
.masthead-watch{color:#fff;padding:3px 5px}
nav{display:flex;align-items:center}
.nav-item{color:#aaa;text-decoration:none;padding:0 14px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:500;border-right:1px solid #444;transition:color .2s;white-space:nowrap}
.nav-item:last-child{border-right:none;padding-right:0}
.nav-item:hover{color:#fff}
.nav-item.live{color:#c41e3a}
.nav-item.active{color:#c41e3a}
.ai-sum-badge{background:#1a1a1a;border:1px solid #c41e3a;color:#c41e3a;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;padding:3px 9px;letter-spacing:.1em;text-transform:uppercase;border-radius:2px;white-space:nowrap}
.ai-sum-badge{background:transparent;border:1px solid #c41e3a;color:#c41e3a;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;padding:3px 9px;letter-spacing:.1em;text-transform:uppercase;border-radius:2px;white-space:nowrap}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#c41e3a;margin-right:4px;animation:pulse 1.5s infinite}

/* ── EXEC BAR ── */
.exec-bar{background:#1e1e1e;border-bottom:1px solid #2a2a2a;padding:14px 28px;flex-shrink:0;display:none;border-left:3px solid rgba(127,119,221,.4)}
.exec-lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#7f77dd;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.exec-para{font-size:14px;line-height:1.8;color:#888;font-weight:300;max-width:960px}

/* ── TOPBAR ── */
.topbar{background:#1a1a1a;border-bottom:1px solid #2a2a2a;padding:10px 28px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.tb-date{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;color:#888;letter-spacing:.04em}
.tb-tag{font-family:'IBM Plex Mono',monospace;font-size:9px;color:#c41e3a;border:1px solid rgba(196,30,58,.3);padding:2px 8px;letter-spacing:.1em;text-transform:uppercase;border-radius:2px}
.tb-stats{display:flex;gap:20px;margin-left:auto}
.tb-stat{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#444;letter-spacing:.04em}
.tb-stat strong{color:#888;font-weight:500}
.tb-stat strong.red{color:#c41e3a}

/* ── MAIN LAYOUT ── */
.main{display:flex;flex:1;overflow:hidden;min-height:0;border:1px solid #2a2a2a;border-top:none;border-bottom:none}

/* ── LEFT SIDEBAR ── */
.sidebar{width:220px;flex-shrink:0;background:#1a1a1a;border-right:1px solid #2a2a2a;display:flex;flex-direction:column;overflow-y:auto}
.sidebar-hdr{padding:14px 18px 10px;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#444;border-bottom:1px solid #222}

.cat-item{display:flex;align-items:center;gap:12px;padding:16px 18px;cursor:pointer;border-bottom:1px solid #1e1e1e;transition:background .15s;border-left:2px solid transparent}
.cat-item:hover{background:#1e1e1e}
.cat-item.active{background:#1e1e1e;border-left-color:var(--cc)}
.cat-pip{width:9px;height:9px;border-radius:50%;flex-shrink:0;background:var(--cc)}
.cat-name{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:#666;transition:color .15s}
.cat-item:hover .cat-name,.cat-item.active .cat-name{color:#ddd}
.cat-count{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#333;margin-left:auto}
.cat-item.active .cat-count{color:#666}

/* ── RIGHT CONTENT ── */
.content{flex:1;display:flex;overflow:hidden;min-width:0}

/* stories list */
.stories-col{width:480px;flex-shrink:0;border-right:1px solid #2a2a2a;overflow-y:auto;display:flex;flex-direction:column;background:#181818}
.stories-col-hdr{padding:14px 18px;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;gap:10px;flex-shrink:0;background:#1a1a1a;position:sticky;top:0;z-index:10}
.stories-col-title{font-family:'Lora',serif;font-size:16px;font-weight:700;color:#eee}
.stories-col-pip{width:8px;height:8px;border-radius:50%;background:var(--cc);flex-shrink:0}
.stories-col-count{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#444;margin-left:auto}

.story-item{padding:16px 18px;border-bottom:1px solid #222;cursor:pointer;transition:background .12s,border-left-color .15s;border-left:2px solid transparent;animation:fadeIn .3s ease forwards;opacity:0}
.story-item:hover{background:#1e1e1e}
.story-item:hover .story-hl{color:#eee}
.story-item.active{background:#1e1e1e;border-left-color:var(--cc)}
.story-item.active .story-hl{color:#fff}
.story-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.story-src{font-family:'IBM Plex Mono',monospace;font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.04em}
.story-time{font-family:'IBM Plex Mono',monospace;font-size:9px;color:#333}
.story-hl{font-family:'Lora',serif;font-size:14px;font-weight:700;color:#aaa;line-height:1.4;margin-bottom:5px;transition:color .15s}
.story-det{font-size:12px;color:#555;line-height:1.62}
.stag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:2px;text-transform:uppercase;letter-spacing:.05em;font-family:'IBM Plex Mono',monospace}

/* analysis panel */
.analysis-col{flex:1;overflow-y:auto;background:#141414;min-width:0}
.analysis-inner{padding:32px 40px;max-width:860px}
.an-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:#2a2a2a;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase}
.an-empty svg{opacity:.1}

.an-top{display:flex;align-items:center;gap:8px;margin-bottom:18px}
.an-pip{width:7px;height:7px;border-radius:50%;background:var(--cc);flex-shrink:0}
.an-cat{font-family:'IBM Plex Mono',monospace;font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.12em}
.an-src{font-family:'IBM Plex Mono',monospace;font-size:9px;color:#444;margin-left:auto}
.an-hl{font-family:'Lora',serif;font-size:26px;font-weight:700;color:#eee;line-height:1.25;margin-bottom:20px;letter-spacing:-.01em}
.an-divider{height:1px;background:#222;margin-bottom:22px}
.an-ai-lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#555;margin-bottom:16px;display:flex;align-items:center;gap:6px}
.ai-dot{display:inline-flex;gap:2px;align-items:center}
.ai-dot span{width:3px;height:3px;border-radius:50%;background:#7f77dd;animation:aiDot 1.2s infinite}
.ai-dot span:nth-child(2){animation-delay:.2s}
.ai-dot span:nth-child(3){animation-delay:.4s}
.an-body{font-size:14px;line-height:1.9;color:#888;font-weight:300}
.an-body p{margin-bottom:16px}
.an-body p:last-child{margin-bottom:0}
.an-link{display:inline-flex;align-items:center;gap:6px;margin-top:22px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:#c41e3a;text-decoration:none;border-bottom:1px dashed rgba(196,30,58,.3);padding-bottom:2px;letter-spacing:.04em}
.an-link:hover{opacity:.7}

footer{padding:18px 24px;border:1px solid #2a2a2a;background:#1a1a1a;border-radius:6px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;flex-shrink:0;margin-top:10px}
.footer-logo{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:#888}
.footer-logo span{color:#c41e3a}
.footer-meta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#555;text-align:right;line-height:1.7}

@media(max-width:960px){.stories-col{width:280px}}
@media(max-width:700px){.sidebar{width:200px}.stories-col{display:none}.main{flex-direction:column}.sidebar{width:100%;flex-direction:row;overflow-x:auto;border-right:none;border-bottom:1px solid #2a2a2a}.cat-item{border-bottom:none;border-left:none;border-bottom:2px solid transparent}.cat-item.active{border-bottom-color:var(--cc)}}
@media(max-width:600px){header{padding:12px 16px}.masthead{font-size:18px}}
.ai-sum-badge{background:transparent;border:1px solid #c41e3a;color:#c41e3a;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;padding:3px 9px;letter-spacing:.1em;text-transform:uppercase;border-radius:2px;white-space:nowrap}
</style>
</head>

    <h1 class="masthead"><span class="masthead-war">WAR</span><span class="masthead-watch">WATCH</span><span class="ai-sum-badge" style="margin-left:10px;align-self:center">AI Summariser</span></h1>

          Select a story to read analysis
        </div>
      </div>

  </div>
</div>

<footer>

<script>/* GROQ_API_KEY must be set in live_data.js as: window.GROQ_API_KEY = 'gsk_...'; */</script>
<script>
(function(){

var d=new Date();
var DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var MONS=['January','February','March','April','May','June','July','August','September','October','November','December'];
var dateStr=DAYS[d.getDay()]+', '+MONS[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();
document.getElementById('header-date').textContent=dateStr;
document.getElementById('tb-date').textContent=dateStr;

var SECTIONS=[
  {key:'war',      label:'War',             color:'#c41e3a',tagBg:'rgba(196,30,58,.15)',  tagColor:'#e07070'},
  {key:'military', label:'Military',         color:'#7f77dd',tagBg:'rgba(127,119,221,.15)',tagColor:'#a89fe0'},
  {key:'diplomacy',label:'Diplomacy',         color:'#3daa72',tagBg:'rgba(61,170,114,.15)', tagColor:'#5ccc8e'},
  {key:'wider_war',label:'Wider War',         color:'#7aabee',tagBg:'rgba(26,87,198,.15)',  tagColor:'#7aabee'},
  {key:'markets',  label:'Markets & Oil',    color:'#d4892a',tagBg:'rgba(212,137,42,.15)',  tagColor:'#d4a94a'},
  {key:'india',    label:'India Impact',     color:'#c41e3a',tagBg:'rgba(196,30,58,.12)',   tagColor:'#e07070',isIndia:true}
];

var FALLBACK={
  war:[
    {headline:'US launches Operation Midnight Hammer — strikes Iran\'s nuclear sites',summary:'B-2 bombers hit Fordow, Natanz and Isfahan overnight. Iran declared it an act of war.',fullAnalysis:'US B-2 stealth bombers conducted simultaneous precision strikes on Iran\'s three most hardened nuclear facilities. This is the single largest US military action against Iran in history.\n\nThe strikes represent a fundamental shift in US policy — moving from sanctions and diplomacy to direct military confrontation. Iran\'s Supreme Leader immediately declared the strikes an act of war.\n\nWatch for IRGC announcements and any movement of Iranian naval assets toward the Strait of Hormuz in the next 24–48 hours.',actor:'US',sourceLabel:'NDTV',time:'2h ago',sourceUrl:'https://www.ndtv.com/world-news/us-israel-iran-war-live-news-updates-donald-trump-mojtaba-khamenei-dubai-uae-baghdad-kuwait-airport-11217035'},
    {headline:'IDF places Kharg Island on active target list — Brent surges to $97',summary:'Israel formally added Kharg Island — 90% of Iran\'s crude exports — to its approved strike list.',fullAnalysis:'The IDF have formally declared Kharg Island an approved military target. The island processes over 90% of Iran\'s crude oil exports worth ~$60B annually.\n\nHowever a Kharg strike would trigger a global energy crisis. Analysts estimate Brent would reach $120–$140 within days, adding ₹2–3 lakh crore to India\'s annual oil import bill.\n\nThe listing is a pressure tactic as much as a military signal — designed to force Iran to the negotiating table.',actor:'Israel',sourceLabel:'Reuters',time:'4h ago',sourceUrl:'https://www.ndtv.com/world-news/iran-war-news-trump-may-send-troops-to-capture-kharg-island-crown-jewel-of-iran-11222025'}
  ],
  military:[
    {headline:'USS Gerald Ford repositions — now 180 miles from Iranian coast',summary:'The Gerald Ford carrier group has moved significantly closer to Iran, within striking range of key infrastructure.',fullAnalysis:'The repositioning of the Gerald Ford battle group to within 180 miles of the Iranian coast is the clearest US military signal yet.\n\nSimultaneously, the USS Eisenhower carrier group\'s entry into the Red Sea means two full US carrier battle groups are now in the region — a level not seen since 2003.\n\nFor India, the US naval presence deters Iranian aggression against Gulf shipping, but raises the risk of direct US-Iran naval confrontation that could trigger a Hormuz closure.',actor:'US Navy',sourceLabel:'USNI News',time:'3h ago',sourceUrl:'#'}
  ],
  diplomacy:[
    {headline:'Qatar mediating US–Iran back-channel — 72-hour pause on table',summary:'Qatari officials are shuttling messages between Washington and Tehran. A 72-hour military pause is on the table.',fullAnalysis:'Qatar has activated its longstanding role as US-Iran intermediary. Qatari officials have made three trips to Tehran and two to Washington in 48 hours.\n\nThe 72-hour pause proposal would freeze all military operations. Iran\'s condition is a public US acknowledgment that the strikes violated international law — something Washington has flatly refused.\n\nFor India a ceasefire — even temporary — would immediately ease oil price pressure and reduce the evacuation threat to 8.9M Indians in the Gulf.',actor:'Qatar',sourceLabel:'Al Jazeera',time:'5h ago',sourceUrl:'https://www.ndtv.com/world-news/iran-war-iran-us-have-been-in-direct-contact-in-recent-days-reports-11225004'}
  ],
  wider_war:[
    {headline:'Russia calls strikes "illegal aggression" — demands UN emergency session',summary:'Russia condemned the US airstrikes and demanded an emergency UNSC session. Two warships repositioned.',fullAnalysis:'Russia\'s language was unusually direct — calling the strikes "an act of state terrorism." Moscow has moved two warships from Tartus closer to Iranian waters.\n\nAt the UN, Russia and China have co-signed a call for an emergency UNSC session. The geopolitical alignment is clear: US-led West vs rest-of-world.\n\nFor India the Russia-China alignment creates a diplomatic opportunity — positioning India as a neutral power that maintains ties with all sides.',actor:'Russia',sourceLabel:'TASS',time:'6h ago',sourceUrl:'#'},
    {headline:'Houthis resume Red Sea attacks — insurance premiums surge 600%',summary:'Houthis reopened Red Sea shipping attacks in solidarity with Iran. Lloyd\'s war risk premiums surged 600%.',fullAnalysis:'The Houthi resumption opens a parallel front against global trade. Several major shipping lines have already diverted vessels around the Cape of Good Hope — adding 10–14 days and $1–2M in fuel costs per voyage.\n\nLloyd\'s of London insurance premiums for Red Sea transits have jumped 600% in 24 hours.\n\nIndian exports to Europe via Suez are directly affected. IT and pharmaceutical companies relying on sea freight face immediate logistics disruption.',actor:'Houthis',sourceLabel:'Al Jazeera',time:'7h ago',sourceUrl:'#'}
  ],
  markets:[
    {headline:'Brent at $97 — analysts warn $120 if Hormuz disrupted',summary:'Oil markets surged as Hormuz closure fears spiked. Goldman raised 90-day target to $115. Gold at $3,080.',fullAnalysis:'The oil price spike to $97 reflects a growing probability of Hormuz disruption being priced in by markets. At $97 Brent, India\'s annual oil import bill rises by roughly ₹1.8 lakh crore.\n\nGold has surged to $3,080 as investors flee to safe havens. The Indian rupee has weakened to 85.4 against the dollar — a five-month low.\n\nFor Indian households a sustained $10/barrel rise translates to ₹5–6/litre at the petrol pump.',actor:'Markets',sourceLabel:'Bloomberg',time:'8h ago',sourceUrl:'#'}
  ],
  india:[
    {headline:'8.9M Indians at risk as Gulf conflict spreads',summary:'Indians across UAE, Saudi Arabia, Kuwait and Bahrain face evacuation risk. $20B in annual remittances at stake.',fullAnalysis:'The Indian diaspora in the Gulf is the largest community directly at risk. UAE alone has 3.5M Indian nationals. Gulf remittances account for ~40% of India\'s total $55B annual inflow.\n\nMEA has opened a 24-hour consular hotline and asked Indians in UAE, Saudi Arabia and Bahrain to register.\n\nFor families in Kerala, Andhra Pradesh and Tamil Nadu — which account for the bulk of Gulf migrants — the anxiety is acute.',category:'Diaspora',significance:'HIGH',sourceUrl:'https://www.ndtv.com/world-news/iran-war-massive-fire-near-dubai-international-airport-as-iranian-drones-strike-11220351',source:'NDTV',time:'Today'},
    {headline:'India\'s Chabahar investment frozen as US strikes hit near port',summary:'US strikes near Bandar Abbas have suspended Chabahar operations — India\'s key strategic access to Central Asia.',fullAnalysis:'India\'s $85M Chabahar investment has been effectively frozen. Operations at the Shahid Beheshti terminal are suspended.\n\nChabahar is central to India\'s connectivity strategy with Afghanistan and Central Asia — without it, India is blocked by Pakistan\'s refusal to allow overland access.\n\nIn the medium term India faces a painful choice: press Washington for Chabahar assurances, or accept the investment may be lost.',category:'Trade',significance:'HIGH',sourceUrl:'https://www.ndtv.com/world-news/us-jets-strike-military-facilities-near-irans-chabahar-trade-zone-report-11221430',source:'NDTV',time:'Today'}
  ]
};

/* ── Build data groups ── */
var D=window.WARWATCH_LIVE;
var groups={};
SECTIONS.forEach(function(s){groups[s.key]=[];});

if(D&&D.newsCards&&D.newsCards.length){
  D.newsCards.forEach(function(c){
    var t=(c.type||'war').toLowerCase().replace(/ /g,'_');
    if(groups[t])groups[t].push(c);else groups.war.push(c);
  });
}
if(D&&D.indiaImpact&&D.indiaImpact.length){
  groups.india=D.indiaImpact.map(function(i){
    return{headline:i.headline,summary:i.detail,fullAnalysis:i.full_detail||i.detail,
      category:i.category,significance:i.significance,sourceUrl:i.sourceUrl,source:i.source,time:'Today'};
  });
}
SECTIONS.forEach(function(s){if(!groups[s.key].length)groups[s.key]=FALLBACK[s.key]||[];});

/* ── Topbar ── */
if(D){
  var tot=0;SECTIONS.forEach(function(s){tot+=groups[s.key].length;});
  var tc=document.getElementById('tb-count');if(tc)tc.textContent=tot;
  var tl=document.getElementById('tb-level');if(tl)tl.textContent=D.escalationLevel||'—';
  var tg=document.getElementById('tb-gen');if(tg&&D.generatedAt)tg.textContent=D.generatedAt.slice(11,16)+' UTC';
}

/* ── Exec bar ── */
var execSrc=D&&(D.execSummaryRich||D.execSummary||D.executive_summary);
if(execSrc){
  var eb=document.getElementById('exec-bar');
  var et=document.getElementById('exec-text');
  if(eb&&et){
    eb.style.display='block';
    et.innerHTML=execSrc.split(/\n\n+/).filter(Boolean).slice(0,1).map(function(p){
      return '<span>'+p.trim()+'</span>';
    }).join('');
  }
}

/* ── Render analysis panel ── */
var _analysisCache={};

function showAnalysis(card,sec){
  var inner=document.getElementById('analysis-inner');
  var srcLbl=card.sourceLabel||card.source||'Source';
  var srcUrl=card.sourceUrl||'#';
  var catLbl=card.category||sec.label;
  var cacheKey=card.headline;

  /* Render shell immediately */
  inner.style.cssText='--cc:'+sec.color;
  inner.innerHTML=
    '<div class="an-top" style="--cc:'+sec.color+'">'+
      '<div class="an-pip"></div>'+
      '<div class="an-cat">'+catLbl+'</div>'+
      '<div class="an-src">'+srcLbl+' · '+(card.time||'')+'</div>'+
    '</div>'+
    '<div class="an-hl" style="animation:fadeIn .3s ease">'+card.headline+'</div>'+
    '<div class="an-divider"></div>'+
    '<div class="an-ai-lbl">AI Analysis <div class="ai-dot"><span></span><span></span><span></span></div></div>'+
    '<div class="an-body" id="an-body-content"><div style="display:flex;gap:4px;align-items:center;padding:8px 0"><span style="width:5px;height:5px;border-radius:50%;background:#7f77dd;animation:aiDot 1.1s infinite;display:inline-block"></span><span style="width:5px;height:5px;border-radius:50%;background:#7f77dd;animation:aiDot 1.1s .2s infinite;display:inline-block"></span><span style="width:5px;height:5px;border-radius:50%;background:#7f77dd;animation:aiDot 1.1s .4s infinite;display:inline-block"></span></div></div>'+
    (srcUrl!=='#'?'<a class="an-link" href="'+srcUrl+'" target="_blank">Read → '+srcLbl+' ↗</a>':'')+
  '';

  /* Return cached */
  if(_analysisCache[cacheKey]){
    document.getElementById('an-body-content').innerHTML=_analysisCache[cacheKey];
    return;
  }

  var context=(card.fullAnalysis||card.full_detail||card.detail||card.summary||'');

  /* 1 — Use pre-built fullAnalysis from bot if available */
  if(context && context.length > 100){
    var localParas=context.split(/\n\n+/).filter(function(p){return p.trim().length>20;}).slice(0,5);
    if(!localParas.length)localParas=[context];
    var localHtml=localParas.map(function(p){return '<p>'+p.trim()+'</p>';}).join('');
    _analysisCache[cacheKey]=localHtml;
    var elL=document.getElementById('an-body-content');
    if(elL){elL.style.animation='fadeIn .4s ease';elL.innerHTML=localHtml;}
    return;
  }

  /* 2 — Live Groq call */
  var prompt='You are a senior geopolitical analyst covering the US-Israel-Iran war of 2026.\n\nHeadline: '+card.headline+'\nContext: '+context+'\n\nWrite exactly 5 paragraphs of analysis (no headings, no bullet points, plain prose only):\nPara 1: What exactly happened and the immediate military/political facts.\nPara 2: Why this matters — the strategic significance.\nPara 3: Regional consequences — for Iran, Israel, Gulf states.\nPara 4: India angle — energy, diaspora, diplomacy, economy impact.\nPara 5: What happens next — most likely 24-48 hour scenario.\n\nEach paragraph: 50-70 words. Be specific, direct, analytical. No filler phrases.';

  var groqKey=window.GROQ_API_KEY||'';
  if(!groqKey){
    /* No key — show summary as fallback */
    var fbParas=(card.summary||card.detail||'').split(/\n\n+/).filter(Boolean);
    var fbHtml=fbParas.map(function(p){return '<p>'+p.trim()+'</p>';}).join('')||'<p>'+( card.summary||'')+'</p>';
    var elFb=document.getElementById('an-body-content');
    if(elFb){elFb.innerHTML=fbHtml;}
    return;
  }

  fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+groqKey},
    body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:700,messages:[{role:'user',content:prompt}]})
  }).then(function(r){return r.json();}).then(function(data){
    var txt=(data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content)||context;
    var paras=txt.split(/\n\n+/).filter(function(p){return p.trim().length>20;}).slice(0,5);
    while(paras.length<3){paras.push(paras[paras.length-1]||context);}
    var html=paras.map(function(p){return '<p>'+p.trim()+'</p>';}).join('');
    _analysisCache[cacheKey]=html;
    var el=document.getElementById('an-body-content');
    if(el){el.style.animation='fadeIn .4s ease';el.innerHTML=html;}
  }).catch(function(){
    var paras=context.split(/\n\n+/).filter(Boolean);
    var html=paras.map(function(p){return '<p>'+p.trim()+'</p>';}).join('')||'<p>'+context+'</p>';
    var el=document.getElementById('an-body-content');
    if(el)el.innerHTML=html;
  });
}

/* ── Render stories for a section ── */
var currentSec=null;

function loadSection(sec){
  currentSec=sec;
  var cards=groups[sec.key]||[];

  /* update stories header */
  var pip=document.getElementById('stories-col').querySelector('.stories-col-pip');
  var title=document.getElementById('stories-title');
  var count=document.getElementById('stories-count');
  if(pip)pip.style='--cc:'+sec.color;
  if(title)title.textContent=sec.label;
  if(count)count.textContent=cards.length+' '+((sec.isIndia)?'items':'stories');

  var list=document.getElementById('stories-list');
  list.innerHTML='';

  cards.forEach(function(card,i){
    var item=document.createElement('div');
    item.className='story-item'+(i===0?' active':'');
    item.style.cssText='--cc:'+sec.color+';animation-delay:'+(i*0.05).toFixed(2)+'s';

    var sig=card.significance;
    var sigBadge='';
    if(sec.isIndia&&sig){
      var sigStyle=sig==='HIGH'?'background:#c41e3a;color:#fff':sig==='MEDIUM'?'background:#8b5e0a;color:#fff':'background:#1d6e42;color:#fff';
      sigBadge='<span class="stag" style="'+sigStyle+'">'+sig+'</span>';
    }
    var catBadge='<span class="stag" style="background:'+sec.tagBg+';color:'+sec.tagColor+'">'+
      (sec.isIndia&&card.category?card.category:sec.label)+'</span>';
    var timeLbl=card.time?' <span class="story-time">'+card.time+'</span>':'\'\';';
    var srcLbl=card.sourceLabel||card.source||'';

    item.innerHTML=
      '<div class="story-meta">'+sigBadge+catBadge+
        (card.time?'<span class="story-time">'+card.time+'</span>':'')+
        (srcLbl?'<span class="story-src">'+srcLbl.toUpperCase()+'</span>':'')+
      '</div>'+
      '<div class="story-hl">'+card.headline+'</div>'+
      '<div class="story-det">'+(card.summary||card.detail||'').slice(0,130)+'</div>';

    (function(c,idx){
      item.onclick=function(){
        list.querySelectorAll('.story-item').forEach(function(el,j){el.classList.toggle('active',j===idx);});
        showAnalysis(c,sec);
      };
    })(card,i);

    list.appendChild(item);
  });

  /* auto-select first */
  if(cards.length) showAnalysis(cards[0],sec);
  else{
    document.getElementById('analysis-inner').innerHTML='<div class="an-empty">No stories in this section</div>';
  }
}

/* ── Build sidebar ── */
var catList=document.getElementById('cat-list');
SECTIONS.forEach(function(sec,i){
  var item=document.createElement('div');
  item.className='cat-item'+(i===0?' active':'');
  item.style.cssText='--cc:'+sec.color;
  item.innerHTML=
    '<div class="cat-pip"></div>'+
    '<div class="cat-name">'+sec.label+'</div>'+
    '<div class="cat-count">'+(groups[sec.key]||[]).length+'</div>';

  item.onclick=function(){
    catList.querySelectorAll('.cat-item').forEach(function(el){el.classList.remove('active');});
    item.classList.add('active');
    loadSection(sec);
  };
  catList.appendChild(item);
});

/* load first section */
loadSection(SECTIONS[0]);

})();
</script>
</body>
